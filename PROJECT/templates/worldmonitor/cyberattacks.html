{% extends 'worldmonitor/base.html' %}

{% block content %}

<h2 style="text-align:center; color:#00ffff;">
  Realtime Threat Monitor
</h2>

<div id="globe-container"></div>

<style>
body {
  background: radial-gradient(circle, #02121c, #000);
  color: #00ffff;
  font-family: Arial;
}

/* MAIN GRID (IMPORTANT 🔥) */
.dashboard {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items: center;
  height: 100vh;
}

/* CENTER GLOBE */
#globe-container {
  width: 100%;
  height: 600px;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* PANELS */
.panel {
  padding: 20px;
  border: 1px solid #00ffff;
  box-shadow: 0 0 20px #00ffff;
  margin: 20px;
}

/* LEFT */
.left {
  justify-self: start;
}

/* RIGHT */
.right {
  justify-self: end;
  text-align: right;
}

/* TITLE */
h2 {
  text-align: center;
  color: #00ffff;
  text-shadow: 0 0 15px #00ffff;
}

.panel {
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 10px #00ffff; }
  to { box-shadow: 0 0 25px #00ffff; }
}

</style>




<div class="dashboard">

  <!-- LEFT PANEL -->
  <div class="panel left">
    <h3>⚡ Attack Stats</h3>
    <p>Total Attacks: 1,234,567</p>
    <p>Active Nodes: 926,102</p>
    <p>Threat Level: 🔴 HIGH</p>
  </div>

  <!-- CENTER GLOBE -->
  <div id="globe-container"></div>

  <!-- RIGHT PANEL -->
  <div class="panel right">
    <h3>🌍 Top Targets</h3>
    <p>USA</p>
    <p>India</p>
    <p>Germany</p>

    <h3>🔥 Attack Types</h3>
    <p>DDoS</p>
    <p>Phishing</p>
    <p>Malware</p>
  </div>

</div>




<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
window.onload = function () {

  const container = document.getElementById("globe-container");

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    75,
    container.clientWidth / container.clientHeight,
    0.1,
    1000
  );

  const renderer = new THREE.WebGLRenderer();
  renderer.setSize(container.clientWidth, container.clientHeight);
  container.appendChild(renderer.domElement);

  // 🌍 Globe
  const geometry = new THREE.SphereGeometry(5, 64, 64);

  const material = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    wireframe: false
  });

  const earth = new THREE.Mesh(geometry, material);
  scene.add(earth);

  camera.position.z = 10;

  // 💡 Light
  const light = new THREE.PointLight(0x00ffff, 1.5);
  light.position.set(10, 10, 10);
  scene.add(light);

  // 🔥 Attack line function
  function createAttackLine(start, end) {

    const lineMaterial = new THREE.LineBasicMaterial({
      color: 0xff3333,
      transparent: true,
      opacity: 0.9
    });

    const curve = new THREE.QuadraticBezierCurve3(
      start,
      new THREE.Vector3(0, 6, 0),
      end
    );

    const points = curve.getPoints(50);
    const geometry = new THREE.BufferGeometry().setFromPoints(points);

    const line = new THREE.Line(geometry, lineMaterial);
    scene.add(line);

    // ⚡ Moving dot
    const dotGeometry = new THREE.SphereGeometry(0.1, 8, 8);
    const dotMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });

    const dot = new THREE.Mesh(dotGeometry, dotMaterial);
    scene.add(dot);

    let progress = 0;

    function animateDot() {
      progress += 0.01;
      if (progress > 1) progress = 0;

      const point = curve.getPoint(progress);
      dot.position.set(point.x, point.y, point.z);

      requestAnimationFrame(animateDot);
    }

    animateDot();
  }

  // 🔥 Add lines
  createAttackLine(
    new THREE.Vector3(-3, 1, 4),
    new THREE.Vector3(3, 2, -4)
  );

  createAttackLine(
    new THREE.Vector3(2, -1, 4),
    new THREE.Vector3(-2, 3, -4)
  );

  // 🔄 Animation
  function animate() {
    requestAnimationFrame(animate);
    earth.rotation.y += 0.01;
    renderer.render(scene, camera);
  }

  animate();
};


const material = new THREE.MeshStandardMaterial({
  color: 0x00ffff,
});
</script>
{% endblock %}
