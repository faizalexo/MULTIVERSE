<html lang="en">

    <!-- Required meta tags -->

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css" integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">

  <style>

.sidebar {
    background: #0f172a;
}

body {
    background: #020617;
}









/* 🔥 SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 190px;
    height: 100vh;

    background: #373737;
    backdrop-filter: blur(10px);

    padding: 20px;
    transition: 0.4s;
    z-index: 1000;
   
    transition: all 0.3s ease-in-out;
    
    transition: all 0.35s ease;
}


/* HIDE */
.sidebar.hide {
    background: ##373737;
    transform: translateX(-85%);
}

/* LOGO */
.sidebar .logo {
    background: #000;
    color: red;
    font-size: 20px;
    margin-bottom: 50px;
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
}

/* MENU */
.sidebar ul {
    list-style: none;
    padding: 0;
}

.sidebar ul li {
    margin: 15px 0;
}

.sidebar ul li a {
    text-decoration: none;
    color: #d0df2e;
    display: block;
    padding: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

/* HOVER */
.sidebar ul li a:hover {
    background: linear-gradient(45deg,red, #0072ff);
    color: white;
}

/* ACTIVE */
.sidebar ul li.active a {
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
}

/* AUTH BOX */
.auth-box {
    margin-top: 30px;
}









/* 🔥 Navbar Background */
.navbar {
    background: linear-gradient(45deg, #141e30, #243b55) !important;
    padding: 12px 20px;
}


/* Logo */
.navbar-brand {
    font-weight: bold;
    color: #b8c01a !important;
    font-size: 20px;
}

/* Nav links */
.navbar-nav .nav-link {
    color: #d21919 !important;
    margin: 0 10px;
    transition: 0.3s;
    position: relative;
}

/* Hover glow */
.navbar-nav .nav-link:hover {
    color: #00c6ff !important;
}

/* Underline animation */
.navbar-nav .nav-link::after {
    content: '';
    display: block;
    width: 0%;
    height: 2px;
    background: #00c6ff;
    transition: 0.3s;
}

.navbar-nav .nav-link:hover::after {
    width: 100%;
}

/* Search box */
form input {
    border-radius: 20px;
}

/* Button */
form button {
    border-radius: 20px;
    border: none;
    background: #00c6ff;
    color: black;
    transition: 0.3s;
}

form button:hover {
    background: #0072ff;
    color: white;
}
</style>



  <body>
    
   <!-- 🔥 SIDEBAR -->
<div id="sidebar" class="sidebar">

    <div style="margin-left:200px;">
  
</div>

    <div class="logo">REAL INTELLIGENCE DASHBOARD </div>

    <ul>
       
    <li class="active"><a href="/">🏠 Dashboard</a></li>
    <li><a href="/cyberattacks/">cyberattacks</a></li>
    <li><a href="/geopolitics/">geopolitics</a></li>

    </ul>




    
</div>


   

    <!-- Optional JavaScript; choose one of the two! -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

  <script>



const sidebar = document.getElementById("sidebar");

// 🔥 ONLY EDGE HOVER (NO BUTTON)
document.addEventListener("mousemove", function(e){

    // 👉 LEFT EDGE (open)
    if(e.clientX < 30){
        sidebar.classList.remove("hide");
    }

    // 👉 AWAY FROM SIDEBAR (hide)
    else if(e.clientX > 250){
        sidebar.classList.add("hide");
    }

});

</script>




</html>
