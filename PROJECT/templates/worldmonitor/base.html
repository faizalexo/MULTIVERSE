<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <title>{% block title %}{% endblock %} worldmonitor</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #000000;
      color: #e4e6eb;
      overflow-x: hidden;
    }

    /* 🔥 SIDEBAR */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100vh;
      background: linear-gradient(180deg, #000000, #111318);
      backdrop-filter: blur(12px);
      padding: 20px;
      z-index: 1000;

      transition: all 0.35s ease;
      box-shadow: 4px 0 20px rgba(0,0,0,0.4);
    }

    .sidebar.hide {
      transform: translateX(-85%);
    }

    /* LOGO */
    .sidebar .logo {
      color: #ffffff;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    /* MENU */
    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      margin: 12px 0;
    }

    .sidebar ul li a {
      text-decoration: none;
      color: #b0b3b8;
      display: block;
      padding: 10px 14px;
      border-radius: 12px;
      transition: all 0.25s ease;
      font-size: 14px;
    }

    /* HOVER */
    .sidebar ul li a:hover {
      background: linear-gradient(45deg, #000000, #971616);
      color: white;
      transform: translateX(5px);
    }

    /* ACTIVE */
    .sidebar ul li.active a {
      background: linear-gradient(45deg, #000000, #620d0d);
      color: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
    }

    /* NAVBAR */
    .navbar {
      background: #000000 !important;
      padding: 12px 20px;
      border-bottom: 1px solid #000000;
    }

    .navbar-brand {
      font-weight: 600;
      color: #4da3ff !important;
      font-size: 18px;
    }

    .navbar-nav .nav-link {
      color: #b0b3b8 !important;
      margin: 0 10px;
      transition: 0.3s;
      position: relative;
    }

    .navbar-nav .nav-link:hover {
      color: #4da3ff !important;
    }

    .navbar-nav .nav-link::after {
      content: '';
      display: block;
      width: 0%;
      height: 2px;
      background: #4da3ff;
      transition: 0.3s;
    }

    .navbar-nav .nav-link:hover::after {
      width: 100%;
    }

    /* FORM */
    form input {
      border-radius: 20px;
      border: none;
      padding: 6px 12px;
      background: #000000;
      color: white;
    }

    form input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.3);
    }

    form button {
      border-radius: 20px;
      border: none;
      background: #4da3ff;
      color: white;
      padding: 6px 14px;
      transition: 0.3s;
    }

    form button:hover {
      background: #1f6feb;
    }
  </style>
</head>

<body>

  <!-- 🔥 SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <div style="margin-left:200px;"></div>

    <div class="logo">World Monitor</div>

    <ul>
      <li class="active">
        <a href="/">🏠 Dashboard</a>
      </li>
      <li>
        <a href="/cyberattacks/">Cyberattacks</a>
      </li>
      <li>
        <a href="/geopolitics/">Geopolitics</a>
      </li>
    </ul>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    const sidebar = document.getElementById('sidebar');

    document.addEventListener('mousemove', function (e) {
      if (e.clientX < 30) {
        sidebar.classList.remove('hide');
      } else if (e.clientX > 250) {
        sidebar.classList.add('hide');
      }
    });
  </script>

</body>
</html>

{% block content %}
{% endblock %}
