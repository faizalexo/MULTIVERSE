{% load static %}




<!DOCTYPE html>
<html lang="en">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAXXONisLIVE</title>
    <style>
        /* Background Video */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Base styles and centering */

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Transparent Glass Login Form */
        .form {
            position: relative;
            display: block;
            padding: 2.2rem;
            max-width: 350px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            z-index: 1;
            border-radius: 12px;
        }

        /*------input and submit section-------*/

        .input-container {
            position: relative;
        }

        .input-container input,
        .form button {
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin: 8px 0;
            font-family: monospace;
            border-radius: 4px;
        }

        .input-container input {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px;
            font-size: 0.875rem;
            width: 100%;
            box-sizing: border-box;
        }

        .input-container input::placeholder {
            color: #ddd;
        }

        .input-mail:focus::placeholder,
        .input-pwd:focus::placeholder {
            opacity: 0;
            transition: opacity 0.9s;
        }

        .submit {
            position: relative;
            display: block;
            padding: 8px;
            background: linear-gradient(90deg, #243949 0%, #517fa4 100%);
            color: #ffffff;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
            font-size: 0.875rem;
            font-weight: 500;
            width: 100%;
            text-transform: uppercase;
            overflow: hidden;
            cursor: pointer;
        }

        .submit:hover {
            transition: all 0.2s ease-out;
            box-shadow: 4px 5px 17px -4px #ffffff;
        }

        .submit:hover::before {
            animation: sh02 0.5s linear;
        }

        .submit::before {
            content: "";
            display: block;
            width: 0px;
            height: 85%;
            position: absolute;
            top: 50%;
            left: 0%;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 50px 30px #fff;
            transform: skewX(-20deg);
        }

        @keyframes sh02 {
            from {
                opacity: 0;
                left: 0%;
            }

            50% {
                opacity: 1;
            }

            to {
                opacity: 0;
                left: 100%;
            }
        }

        /*--------signup section---------*/

        .signup-link {
            color: #c0c0c0;
            font-size: 0.875rem;
            text-align: center;
            font-family: monospace;
            margin-top: 15px;
        }

        .signup-link a {
            color: #fff;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /*--------header section-----------*/

        .form-title {
            font-size: 1.25rem;
            font-family: monospace;
            font-weight: 600;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.7);
            margin-bottom: 0.5rem;
        }

        .form-title span {
            animation: flickering 2s linear infinite both;
        }

        .title-2 {
            display: block;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            font-size: 2.1rem;
            font-weight: 800;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            -webkit-text-stroke: #fff 0.1rem;
            letter-spacing: 0.2rem;
            color: transparent;
            text-shadow: 0px 0px 16px #cecece;
        }

        .title-2 span::before,
        .title-2 span::after {
            content: "—";
        }

        @keyframes flickering {

            0%,
            100%,
            41.99%,
            43.01%,
            47.99%,
            49.01% {
                opacity: 1;
            }

            42%,
            43%,
            48%,
            49% {
                opacity: 0;
            }
        }

        /*---------shooting stars-----------*/

        .bg-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .star {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1),
                0 0 0 8px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(255, 255, 255, 0.1);
            animation: animate 3s linear infinite;
        }

        .star::before {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }

        @keyframes animate {
            0% {
                transform: rotate(315deg) translateX(0);
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            100% {
                transform: rotate(315deg) translateX(-1000px);
                opacity: 0;
            }
        }

        .star:nth-child(1) {
            top: 0;
            right: 0;
            left: initial;
            animation-delay: 0s;
            animation-duration: 1s;
        }

        .star:nth-child(2) {
            top: 0;
            right: 100px;
            left: initial;
            animation-delay: 0.2s;
            animation-duration: 3s;
        }

        .star:nth-child(3) {
            top: 0;
            right: 220px;
            left: initial;
            animation-delay: 2.75s;
            animation-duration: 2.75s;
        }

        .star:nth-child(4) {
            top: 0;
            right: -220px;
            left: initial;
            animation-delay: 1.6s;
            animation-duration: 1.6s;
        }

        /* Login message styles */

        .login-message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .login-message.error {
            background-color: rgba(220, 53, 69, 0.8);
            color: white;
            border: 1px solid #dc3545;
        }

        .login-message.success {
            background-color: rgba(25, 135, 84, 0.8);
            color: white;
            border: 1px solid #198754;
        }

        .loader {
            position: relative;
            width: 96px;
            height: 96px;
            transform: rotate(45deg);
        }

        .loader-square {
            position: absolute;
            width: 28px;
            height: 28px;
            margin: 2px;
            background: white;
            animation: square-animation 10s ease-in-out infinite;
        }

        .loader-square:nth-of-type(1) {
            animation-delay: 0s;
        }

        .loader-square:nth-of-type(2) {
            animation-delay: -1.4s;
        }

        .loader-square:nth-of-type(3) {
            animation-delay: -2.8s;
        }

        .loader-square:nth-of-type(4) {
            animation-delay: -4.2s;
        }

        .loader-square:nth-of-type(5) {
            animation-delay: -5.6s;
        }

        .loader-square:nth-of-type(6) {
            animation-delay: -7s;
        }

        .loader-square:nth-of-type(7) {
            animation-delay: -8.4s;
        }

        .loader-square:nth-of-type(8) {
            animation-delay: -9.8s;
        }
    </style>
</head>

<body>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const form = document.getElementById("loginForm");
            const overlay = document.getElementById("loadingOverlay");

            form.addEventListener("submit", function (e) {

                e.preventDefault(); // 🔥 रोक दिया तुरंत submit

                overlay.style.display = "flex"; // 🔥 animation दिखाओ

                // 🔥 delay ताकि user animation देखे
                setTimeout(() => {
                    form.submit(); // अब actual submit
                }, 700); // 600–800ms best

            });

        });
    </script>

    <!-- BACKGROUND VIDEO -->


    <video autoplay muted loop id="bg-video">
        <source src="{% static 'video123.mp4' %}" type="video/mp4">
    </video>
    <form class="form" id="loginForm" method="POST" action="{% url 'login' %}" autocomplete="off">
        {% csrf_token %}



        <div class="form-title"><span>SIGN IN TO</span></div>
        <div class="title-2"><span>KAXONisLIVE</span></div>

        <div class="input-container">
            <input name="username" placeholder="USERNAME" type="text" class="input-mail" required autocomplete="off" />
        </div>

        <section class="bg-stars">
            <span class="star"></span>
            <span class="star"></span>
            <span class="star"></span>
            <span class="star"></span>
        </section>

        <div class="input-container">
            <input name="password" placeholder="PASSWORD" type="password" class="input-pwd" required />
        </div>

        <button class="submit" type="submit">
            <span class="sign-text">LOGIN</span>

        </button>

        <p class="signup-link">
            NO ACCOUNT?
            <a class="up" href="{% url 'register' %}">REGISTER NOW</a>
        </p>
    </form>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader">
            <div class="loader-square"></div>
            <div class="loader-square"></div>
            <div class="loader-square"></div>
            <div class="loader-square"></div>
            <div class="loader-square"></div>
            <div class="loader-square"></div>
            <div class="loader-square"></div>
            <div class="loader-square"></div>
        </div>
    </div>

</body>

</html>
