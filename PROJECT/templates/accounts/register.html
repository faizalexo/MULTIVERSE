{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KAXXONisLIVE</title>
    <style>
        /* Background Video */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Base styles and centering */

        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Transparent Glass Login Form */
        .form {
            position: relative;
            display: block;
            padding: 2.2rem;
            max-width: 350px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            z-index: 1;
            border-radius: 12px;
        }

        /*------input and submit section-------*/

        .input-container {
            position: relative;
        }

        .input-container input,
        .form button {
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            margin: 8px 0;
            font-family: monospace;
            border-radius: 4px;
        }

        .input-container input {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px;
            font-size: 0.875rem;
            width: 100%;
            box-sizing: border-box;
        }

        .input-container input::placeholder {
            color: #ddd;
        }

        .input-mail:focus::placeholder,
        .input-pwd:focus::placeholder {
            opacity: 0;
            transition: opacity 0.9s;
        }

        .submit {
            position: relative;
            display: block;
            padding: 8px;
            background: linear-gradient(90deg, #243949 0%, #517fa4 100%);
            color: #ffffff;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.5);
            font-size: 0.875rem;
            font-weight: 500;
            width: 100%;
            text-transform: uppercase;
            overflow: hidden;
            cursor: pointer;
        }

        .submit:hover {
            transition: all 0.2s ease-out;
            box-shadow: 4px 5px 17px -4px #ffffff;
        }

        .submit:hover::before {
            animation: sh02 0.5s linear;
        }

        .submit::before {
            content: "";
            display: block;
            width: 0px;
            height: 85%;
            position: absolute;
            top: 50%;
            left: 0%;
            opacity: 0;
            background: #fff;
            box-shadow: 0 0 50px 30px #fff;
            transform: skewX(-20deg);
        }

        @keyframes sh02 {
            from {
                opacity: 0;
                left: 0%;
            }

            50% {
                opacity: 1;
            }

            to {
                opacity: 0;
                left: 100%;
            }
        }

        /*--------signup section---------*/

        .signup-link {
            color: #c0c0c0;
            font-size: 0.875rem;
            text-align: center;
            font-family: monospace;
            margin-top: 15px;
        }

        .signup-link a {
            color: #fff;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /*--------header section-----------*/

        .form-title {
            font-size: 1.25rem;
            font-family: monospace;
            font-weight: 600;
            text-align: center;
            color: #fff;
            text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.7);
            margin-bottom: 0.5rem;
        }

        .form-title span {
            animation: flickering 2s linear infinite both;
        }

        .title-2 {
            display: block;
            margin-top: -0.5rem;
            margin-bottom: 1rem;
            font-size: 2.1rem;
            font-weight: 800;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            -webkit-text-stroke: #fff 0.1rem;
            letter-spacing: 0.2rem;
            color: transparent;
            text-shadow: 0px 0px 16px #cecece;
        }

        .title-2 span::before,
        .title-2 span::after {
            content: "—";
        }

        @keyframes flickering {

            0%,
            100%,
            41.99%,
            43.01%,
            47.99%,
            49.01% {
                opacity: 1;
            }

            42%,
            43%,
            48%,
            49% {
                opacity: 0;
            }
        }

        /*---------shooting stars-----------*/

        .bg-stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .star {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1),
                0 0 0 8px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(255, 255, 255, 0.1);
            animation: animate 3s linear infinite;
        }

        .star::before {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, #fff, transparent);
        }

        @keyframes animate {
            0% {
                transform: rotate(315deg) translateX(0);
                opacity: 1;
            }

            70% {
                opacity: 1;
            }

            100% {
                transform: rotate(315deg) translateX(-1000px);
                opacity: 0;
            }
        }

        .star:nth-child(1) {
            top: 0;
            right: 0;
            left: initial;
            animation-delay: 0s;
            animation-duration: 1s;
        }

        .star:nth-child(2) {
            top: 0;
            right: 100px;
            left: initial;
            animation-delay: 0.2s;
            animation-duration: 3s;
        }

        .star:nth-child(3) {
            top: 0;
            right: 220px;
            left: initial;
            animation-delay: 2.75s;
            animation-duration: 2.75s;
        }

        .star:nth-child(4) {
            top: 0;
            right: -220px;
            left: initial;
            animation-delay: 1.6s;
            animation-duration: 1.6s;
        }

        /* Login message styles */

        .login-message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }

        .login-message.error {
            background-color: rgba(220, 53, 69, 0.8);
            color: white;
            border: 1px solid #dc3545;
        }

        .login-message.success {
            background-color: rgba(25, 135, 84, 0.8);
            color: white;
            border: 1px solid #198754;
        }

        /* Loading Overlay */

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loader-ring {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(0, 194, 255, 0.2);
            border-top: 5px solid #00c2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(11, 68, 224, 0.5);
        }

        .loader-text {
            margin-top: 20px;
            font-size: 18px;
            color: #00c2ff;
            text-shadow: 0 0 10px #00c2ff;
            font-weight: 600;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- BACKGROUND VIDEO -->
    <video autoplay muted loop id="bg-video">
        <source src="{% static 'video123.mp4' %}" type="video/mp4">
    </video>

    <form class="form" method="POST" action="{% url 'register' %}">
        {% csrf_token %}



        <!-- 🔥 TITLE CHANGE -->
        <div class="form-title"><span>SIGN UP TO</span></div>
        <div class="title-2"><span>KAXONisLIVE</span></div>

        <!-- 👇 NEW FIELDS -->
        <div class="input-container">
            <input name="username" placeholder="USERNAME" type="text" required />
        </div>

        <div class="input-container">
            <input name="email" placeholder="EMAIL" type="email" required />
        </div>

        <section class="bg-stars">
            <span class="star"></span>
            <span class="star"></span>
            <span class="star"></span>
            <span class="star"></span>
        </section>

        <div class="input-container">
            <input name="password" placeholder="PASSWORD" type="password" required />
        </div>

        <div class="input-container">
            <input name="confirm_password" placeholder="CONFIRM PASSWORD" type="password" required />
        </div>

        <!-- 🔥 BUTTON CHANGE -->
        <button class="submit" type="submit">
            REGISTER
        </button>

        <!-- 🔁 SWITCH LINK -->
        <p class="signup-link">
            ALREADY HAVE ACCOUNT?
            <a href="{% url 'login' %}">LOGIN</a>
        </p>

    </form>

</body>

</html>
