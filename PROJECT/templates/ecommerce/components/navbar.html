<!DOCTYPE html>
<html lang="en">
<title>Navbar</title>
<style>
    /* 🔥 GLOBAL RESET */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    /* 🌌 PREMIUM BACKGROUND */
    body {
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
    }

    /* ================= NAVBAR ================= */

    .navbar {
        position: sticky;
        top: 0;
        width: 100%;
        backdrop-filter: blur(20px);
        background: rgba(2, 6, 23, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        z-index: 1000;
    }

    .nav-container {
        max-width: 1300px;
        margin: auto;
        padding: 16px 25px;

        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    /* 💎 BRAND */
    .brand {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1px;

        background: linear-gradient(90deg, #38bdf8, #6366f1, #a855f7);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    /* ================= CENTER ================= */

    .nav-center {
        display: flex;
        align-items: center;
        gap: 25px;
    }

    /* 🔍 SEARCH */
    .search-box input {
        padding: 10px 16px;
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        width: 220px;

        background: rgba(255, 255, 255, 0.05);
        color: white;
        transition: 0.3s;
    }

    .search-box input:focus {
        border: 1px solid #6366f1;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
    }

    .search-box input::placeholder {
        color: #94a3b8;
    }

    /* 🔗 LINKS */
    .nav-center a {
        text-decoration: none;
        color: #94a3b8;
        font-weight: 500;
        position: relative;
        transition: 0.3s;
    }

    .nav-center a:hover {
        color: #fff;
    }

    /* underline glow */
    .nav-center a::after {
        content: "";
        position: absolute;
        width: 0%;
        height: 2px;
        bottom: -5px;
        left: 0;
        background: linear-gradient(90deg, #38bdf8, #6366f1);
        transition: 0.3s;
    }

    .nav-center a:hover::after {
        width: 100%;
    }

    /* ================= RIGHT ================= */

    .nav-right {
        display: flex;
        align-items: center;
        gap: 15px;
        position: relative;
    }

    /* 💎 BUTTON */
    .btn {
        padding: 8px 18px;
        border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;

        transition: 0.3s;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(168, 85, 247, 0.5);
    }

    /* 👤 USER BUTTON */
    .user-btn {
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #cbd5f5;
        cursor: pointer;
    }

    .user-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
    }

    /* ================= DROPDOWN ================= */

    .dropdown {
        position: absolute;
        right: 0;
        top: 50px;
        width: 180px;

        background: rgba(2, 6, 23, 0.95);
        backdrop-filter: blur(20px);

        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);

        display: none;
    }

    .dropdown a {
        display: block;
        padding: 12px;
        color: #94a3b8;
        text-decoration: none;
        transition: 0.3s;
    }

    .dropdown a:hover {
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
    }

    .dropdown.show {
        display: block;
    }

    /* ================= CART BUTTON ================= */

    .cart-btn {
        position: relative;
    }

    /* 🔴 BADGE */
    .cart-badge {
        position: absolute;
        top: -5px;
        right: -8px;

        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white;
        font-size: 10px;
        padding: 3px 6px;
        border-radius: 50%;
    }

    /* ================= CART POPUP ================= */

    .cart-popup {
        position: absolute;
        top: 65px;
        right: 0;
        display: none;
        z-index: 9999;
    }

    .cart-popup.active {
        display: block;
    }

    /* ================= UIVERSE CART STYLE ================= */

    .master-container {
        display: grid;
        gap: 8px;
    }

    .card {
        width: 400px;
        background: #ffffff;
        border-radius: 16px;

        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .title {
        padding: 12px 20px;
        border-bottom: 1px solid #eee;
        font-size: 12px;
        font-weight: 700;
        color: #555;
    }

    /* PRODUCTS */
    .product {
        display: grid;
        grid-template-columns: 60px 1fr 80px 1fr;
        gap: 10px;
        padding: 10px;
    }

    /* QUANTITY */
    .quantity {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        border: 1px solid #ddd;
        border-radius: 6px;
    }

    .quantity button {
        border: none;
        background: none;
        cursor: pointer;
    }

    /* CHECKOUT BUTTON */
    .checkout-btn {
        background: linear-gradient(135deg, #6366f1, #a855f7);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px;
        cursor: pointer;
    }

    .checkout-btn:hover {
        box-shadow: 0 10px 25px rgba(168, 85, 247, 0.4);
    }
</style>
<script>
    function toggleCart() {
        const popup = document.getElementById("cartPopup");

        popup.classList.toggle("active");

        if (popup.classList.contains("active")) {
            fetch('/shop/cart/', {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
                .then(res => res.text())
                .then(data => {
                    popup.innerHTML = data;
                });
        }
    }
</script>
<script>
    function toggleDropdown() {
        document.getElementById("dropdown").classList.toggle("show");
    }

    window.addEventListener("click", function (e) {
        if (!e.target.closest(".user-menu")) {
            const dropdown = document.getElementById("dropdown");
            if (dropdown) dropdown.classList.remove("show");
        }
    });
    const menuToggle = document.getElementById('menuToggle');
    const navCenter = document.querySelector('.nav-center');

    menuToggle.addEventListener('click', () => {
        navCenter.classList.toggle('active');
    });
</script>
<nav class="navbar">
    <div class="nav-container">

        <!-- LEFT -->
        <div class="brand">FLOW</div>

        <!-- CENTER -->
        <div class="nav-center">

            <!-- 🔍 SEARCH -->
            <div class="search-box">
                <input type="text" placeholder="Search products...">
            </div>

            <!-- LINKS -->
            <a href="{% url 'home' %}">Home</a>
            <a href="#">Explore</a>

        </div>

        <!-- RIGHT -->
        <div class="nav-right">

            {% if request.user.is_authenticated %}
            <div class="user-menu">
                <button class="user-btn" onclick="toggleDropdown()">
                    👤 {{ request.user.username }}
                </button>

                <div id="dropdown" class="dropdown">
                    <a href="#">Profile</a>
                    <a href="#">Orders</a>
                    <a href="{% url 'logout' %}">Logout</a>
                </div>
            </div>
            {% else %}
            <a href="{% url 'login' %}" class="btn">Login</a>
            {% endif %}

            <!-- 🛒 CART -->
            <button class="btn cart-btn" onclick="toggleCart()">
                🛒 Cart
                <span class="cart-badge">0</span>
            </button>

        </div>

    </div>
</nav>

<!-- POPUP -->
<div id="cartPopup" class="cart-popup"></div>
</nav>
