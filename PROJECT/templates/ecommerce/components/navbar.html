<!DOCTYPE html>
<html lang="en">
<title>Navbar</title>
<style>
/* ================= GLOBAL ================= */
:root {
    --bg-main: #ffffff;
    --bg-soft: #f7f7f7;
    --bg-glass: rgba(255, 255, 255, 0.7);

    --border: #e5e5e5;

    --text-main: #111111;
    --text-muted: #777777;

    --radius: 14px;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: var(--bg-main);
    color: var(--text-main);
    -webkit-font-smoothing: antialiased;
}

/* ================= NAVBAR ================= */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    backdrop-filter: blur(10px);
    background: var(--bg-glass);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
}

.nav-container {
    max-width: 1300px;
    margin: auto;
    padding: 18px 40px;

    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
}

/* LEFT */
.nav-left {
    display: flex;
    align-items: center;
}

/* BRAND */
.brand {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
}

/* CENTER */
.nav-center {
    display: flex;
    gap: 30px;
    align-items: center;
    justify-content: center;
}

.nav-center a {
    color: var(--text-muted);
    text-decoration: none;
    font-weight: 500;
    transition: 0.25s ease;
}

.nav-center a:hover {
    color: var(--text-main);
}

/* SEARCH */
.search-box input {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-main);
    outline: none;
    transition: 0.25s ease;
}

.search-box input:focus {
    border-color: #bbb;
}

/* RIGHT */
.nav-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
}

/* ================= BUTTON ================= */
.btn {
    padding: 8px 20px;
    border-radius: 999px;
    background: #111;
    color: #fff;
    font-weight: 500;
    text-decoration: none;
    transition: 0.25s ease;
}

.btn:hover {
    background: #333;
    transform: translateY(-1px);
}

/* USER */
.user-menu {
    position: relative;
}

.user-btn {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: #fff;
    color: #111;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: 0.25s ease;
}

.user-btn:hover {
    border-color: #bbb;
}

/* DROPDOWN */
.dropdown {
    position: absolute;
    top: 60px;
    right: 0;
    width: 190px;

    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);

    opacity: 0;
    transform: translateY(10px);
    pointer-events: none;

    transition: 0.25s ease;
}

.dropdown.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

.dropdown a {
    display: block;
    padding: 10px 14px;
    text-decoration: none;
    color: #111;
    font-size: 14px;
}

.dropdown a:hover {
    background: #f5f5f5;
}

/* ================= CART ================= */
.cart-btn {
    width: 42px;
    height: 42px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: #111;
    color: #fff;

    border-radius: 50%;
    cursor: pointer;
    position: relative;

    transition: 0.25s ease;
}

.cart-btn:hover {
    background: #333;
}

/* BADGE */
.cart-badge {
    position: absolute;
    top: -4px;
    right: -4px;

    background: #111;
    color: #fff;

    font-size: 10px;
    font-weight: 600;

    padding: 3px 6px;
    border-radius: 50%;
    min-width: 18px;
    text-align: center;
}

/* CART POPUP */
.cart-popup {
    position: fixed; /* 🔥 change from absolute */

    top: 80px;
    right: 40px;

    width: 340px;

    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);

    box-shadow: 0 30px 60px rgba(0,0,0,0.08);

    padding: 15px;

    opacity: 0;
    transform: translateY(10px) scale(0.98);
    pointer-events: none;

    transition: all 0.25s ease;
}

.cart-popup.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
}
/* ================= CART CARD ================= */
.card {
    width: 100%;
    background: #fff;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* TITLE */
.title {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
}

/* PRODUCT ROW */
.product {
    display: grid;
    grid-template-columns: 60px 1fr 80px;
    gap: 10px;
    padding: 12px;
}

/* QUANTITY */
.quantity {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}

.quantity button {
    background: transparent;
    border: none;
    padding: 6px 10px;
    cursor: pointer;
}

.quantity button:hover {
    background: #f5f5f5;
}

/* CHECKOUT */
.checkout-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 999px;
    border: none;

    background: #111;
    color: #fff;

    cursor: pointer;
    transition: 0.25s ease;
}

.checkout-btn:hover {
    background: #333;
}
</style>
<script>
    function toggleCart() {
        const popup = document.getElementById("cartPopup");

        popup.classList.toggle("active");

        if (popup.classList.contains("active")) {
            fetch('/shop/cart/', {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
                .then(res => res.text())
                .then(data => {
                    popup.innerHTML = data;
                });
        }
    }
</script>
<script>
   function toggleDropdown() {
    const dropdown = document.getElementById("dropdown");
    dropdown.classList.toggle("show");
}




/* CLOSE when clicking outside */
window.addEventListener("click", function(e) {
    const dropdown = document.getElementById("dropdown");
    const userBtn = document.querySelector(".user-btn");

    if (!userBtn.contains(e.target)) {
        dropdown.classList.remove("show");
    }

    const cart = document.querySelector(".cart-popup");
    const cartBtn = document.querySelector(".cart-btn");

    if (!cartBtn.contains(e.target) && !cart.contains(e.target)) {
        cart.classList.remove("active");
    }
});
</script>
<nav class="navbar">
    <div class="nav-container">

        <!-- LEFT -->
        <div class="brand">FLOW</div>

        <!-- CENTER -->
        <div class="nav-center">

            <!-- 🔍 SEARCH -->
            <div class="search-box">
                <input type="text" placeholder="Search products...">
            </div>

            <!-- LINKS -->
            <a href="{% url 'home' %}">Home</a>
            <a href="#">Explore</a>
            <a href="{% url 'product_list' %}">Products</a>

        </div>

        <!-- RIGHT -->
       <div class="nav-right">

    {% if request.user.is_authenticated %}
    <div class="user-menu">
        <button class="user-btn" onclick="toggleDropdown()">
            👤 {{ request.user.username }}
        </button>

        <div id="dropdown" class="dropdown">
            <a href="#">Profile</a>
            <a href="#">Orders</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>
    {% else %}
    <a href="{% url 'login' %}" class="btn">Login</a>
    {% endif %}

    <div class="cart-wrapper">
        <button class="cart-btn" onclick="toggleCart()">🛒</button>

        <!-- ✅ POPUP INSIDE -->
        <div id="cartPopup" class="cart-popup"></div>
    </div>

</div>
    </div>
</nav>
