<div class="master-container">

    <!-- 🛒 CART -->
    <div class="card cart">
        <label class="title">Your cart</label>

        <div class="products">
            {% for item in cart_items %}
            <div class="product">
                <div>
                    <span>{{ item.product.name }}</span>
                    <p>₹{{ item.product.price }}</p>
                </div>

                <div class="quantity">
                    <button onclick="updateCart('{{ item.id }}', 'decrease')">-</button>

                    <label id="qty-{{ item.id }}">{{ item.quantity }}</label>

                    <button onclick="updateCart('{{ item.id }}', 'increase')">+</button>
                </div>

                <label class="price small">₹{{ item.product.price }}</label>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- 🧾 CHECKOUT DETAILS -->
    <div class="card cart">
        <label class="title">CHECKOUT</label>

        <div class="steps">
            <div class="step">
                <span>SHIPPING</span>
                <p>{{ user.username }}</p>
                <p>India</p>

                <hr>

                <span>PAYMENT METHOD</span>
                <p>Demo Mode</p>

                <hr>

                <div class="details">
                    <span>Subtotal:</span>
                    <span id="cart-total">₹{{ total }}</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 💳 FINAL CHECKOUT -->
    <div class="card checkout">
        <div class="checkout--footer">
            <label class="price" id="cart-total-footer">₹{{ total }}</label>

            <button class="checkout-btn" onclick="checkout()">
                Checkout
            </button>
        </div>
    </div>

</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            for (let cookie of document.cookie.split(';')) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.slice(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
<script>
    function updateCart(cartId, action) {

        fetch(`/shop/update/${cartId}/${action}/`, {
            method: "POST",
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
            }
        })
            .then(res => res.json())
            .then(data => {

                // ❌ item delete
                if (data.deleted) {
                    document.getElementById(`item-${cartId}`).remove();
                } else {
                    // 🔢 quantity update
                    document.getElementById(`qty-${cartId}`).innerText = data.quantity;

                    // 💰 item total update
                    document.getElementById(`price-${cartId}`).innerText = "₹" + data.item_total;
                }

                // 🛒 cart total update
                document.getElementById("cart-total").innerText = "₹" + data.cart_total;
                document.getElementById("cart-total-footer").innerText = "₹" + data.cart_total;

            })
            .catch(err => {
                console.error(err);
            });
    }
</script>


<script>
    function checkout() {

        const btn = document.querySelector(".checkout-btn");

        // 🔄 loading
        btn.innerText = "Processing...";
        btn.disabled = true;

        setTimeout(() => {

            // 🎉 success popup
            const popup = document.getElementById("order-success");
            popup.style.display = "block";

            // reset button
            btn.innerText = "Checkout";
            btn.disabled = false;

            // 🧹 cart empty (UI only)
            document.querySelector(".products").innerHTML =
                "<p style='padding:20px;'>Cart is empty</p>";

        }, 2000);
    }
</script>
