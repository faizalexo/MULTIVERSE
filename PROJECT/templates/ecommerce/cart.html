{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/ecommerce.css' %}">

<div class="master-container">

  <!-- 🛒 CART -->
  <div class="card cart">
    <label class="title">Your cart</label>

    <div class="products">

      {% for item in cart_items %}
      <div class="product" id="item-{{ item.id }}">

        <svg fill="none" viewBox="0 0 60 60" height="60" width="60">
          <rect fill="#FFF6EE" rx="8.25" height="60" width="60"></rect>
        </svg>

        <div>
          <span>{{ item.product.name }}</span>
          <p>₹{{ item.product.price }}</p>
        </div>

        <!-- 🔥 QUANTITY -->
         
        <div class="quantity">
          <button class="qty-btn" data-id="{{ item.id }}" data-action="decrease">-</button>

          <label id="qty-{{ item.id }}">{{ item.quantity }}</label>

          <button class="qty-btn" data-id="{{ item.id }}" data-action="increase">+</button>
        </div>
        

        <!-- 💰 PRICE -->
        <label class="price small" id="price-{{ item.id }}">
          ₹{{ item.product.price|floatformat:2 }}
        </label>

      </div>
      {% empty %}
      <p style="padding:20px;">Cart is empty</p>
      {% endfor %}

    </div>
  </div>

  <!-- 🎟 COUPON -->
  <div class="card coupons">
    <label class="title">Apply coupons</label>
    <form class="form">
      <input type="text" placeholder="Apply your coupons here" class="input_field">
      <button type="button">Apply</button>
    </form>
  </div>

  <!-- 💳 CHECKOUT -->
  <div class="card checkout">
    <label class="title">Checkout</label>

    <div class="details">
      <span>Your cart subtotal:</span>
      <span id="cart-total">₹{{ total }}</span>

      <span>Shipping:</span>
      <span id="shipping">₹{{ shipping }}</span>

      <span>Tax:</span>
      <span id="tax">₹{{ tax }}</span>
    </div>

    <div class="checkout--footer">
      <label class="price" id="cart-total-footer">₹{{ total }}</label>

      <button class="checkout-btn">Checkout</button>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>



console.log("SCRIPT LOADED ✅");

document.addEventListener("click", function (e) {

    const btn = e.target.closest("button");

    if (!btn) return;

    console.log("CLICK DETECTED 🔥");

    // ======================
    // QUANTITY
    // ======================
    if (btn.classList.contains("qty-btn")) {

        const cartId = btn.dataset.id;
        const action = btn.dataset.action;

        console.log("QTY:", cartId, action);

        fetch(`/shop/update/${cartId}/${action}/`, {
            method: "POST",
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
            }
        })
        .then(res => res.json())
        .then(data => {
            console.log("RESPONSE:", data);
        });

    }

    // ======================
    // CHECKOUT
    // ======================
    if (btn.classList.contains("checkout-btn")) {

        console.log("CHECKOUT CLICK 🔥");

        fetch("/shop/checkout/", {
            method: "POST",
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
            }
        })
        .then(res => res.json())
        .then(data => {
            console.log("CHECKOUT RESPONSE:", data);
        });

    }

});

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        for (let cookie of document.cookie.split(';')) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.slice(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

document.addEventListener("click", function (e) {

    // 🔥 FIX: button ya svg click dono handle
    const btn = e.target.closest("button");

    if (!btn) return;

    // ======================
    // ✅ QUANTITY
    // ======================
    if (btn.classList.contains("qty-btn")) {

        const cartId = btn.dataset.id;
        const action = btn.dataset.action;

        console.log("QTY CLICK", cartId, action);

        fetch(`/shop/update/${cartId}/${action}/`, {
            method: "POST",
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
            }
        })
        .then(res => res.json())
        .then(data => {

            if (data.deleted) {
                document.getElementById(`item-${cartId}`)?.remove();
                return;
            }

            document.getElementById(`qty-${cartId}`).innerText = data.quantity;
            document.getElementById(`price-${cartId}`).innerText = "₹" + data.item_total;

            document.getElementById("cart-total").innerText = "₹" + data.cart_total;
            document.getElementById("cart-total-footer").innerText = "₹" + data.cart_total;

        });

    }

    // ======================
    // ✅ CHECKOUT
    // ======================
    if (btn.classList.contains("checkout-btn")) {

        console.log("CHECKOUT CLICK 🔥");

        btn.innerText = "Processing...";
        btn.disabled = true;

        fetch("/shop/checkout/", {
            method: "POST",
            headers: {
                "X-CSRFToken": getCookie("csrftoken"),
            }
        })
        .then(res => res.json())
        .then(data => {

            if (data.success) {

                btn.innerText = "✔ Order Placed";

                document.querySelector(".products").innerHTML =
                    "<p style='padding:20px;'>Cart is empty</p>";

                document.getElementById("cart-total").innerText = "₹0";
                document.getElementById("cart-total-footer").innerText = "₹0";

            } else {
                btn.innerText = "Checkout";
                btn.disabled = false;
                alert("Error");
            }

        });

    }

});

</script>
{% endblock %}
