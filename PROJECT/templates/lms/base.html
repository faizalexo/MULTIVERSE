<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiverse LMS</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* 🌌 Glass Navbar */
        .glass-nav {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }

        /* 🎯 Hover animation */
        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #6366f1;
            left: 0;
            bottom: -2px;
            transition: 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 🌈 Gradient background */
        .bg-main {
            background: linear-gradient(to right, #eef2ff, #f5f3ff);
            min-height: 100vh;
        }
    </style>
</head>

<body class="bg-main">

    <!-- 🔝 NAVBAR -->
    <nav class="glass-nav shadow-md px-8 py-4 flex justify-between items-center sticky top-0 z-50">

        <!-- LOGO -->
        <h1 class="text-2xl font-bold text-indigo-600">
            FLOW
        </h1>

        <!-- LINKS -->
        <div class="flex items-center space-x-6 text-gray-700 font-medium">

            <a href="/" class="nav-link hover:text-indigo-600">Home</a>
            <a href="/lms/courses/" class="nav-link hover:text-indigo-600">Courses</a>
            <a href="/lms/about/" class="nav-link hover:text-indigo-600">About</a>

            <!-- AUTH -->
            {% if user.is_authenticated %}
                <span class="text-gray-500">Hi, {{ user.username }}</span>

                <a href="/accounts/logout/" 
                   class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600">
                   Logout
                </a>
            {% else %}
                <a href="/accounts/login/" 
                   class="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700">
                   Login
                </a>
            {% endif %}

        </div>

    </nav>

    <!-- 📦 MAIN CONTENT -->
    <main class="p-8">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
