<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiverse LMS</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* 🌌 Gradient Dark BG */
        .bg-main {
            background: linear-gradient(135deg, #0f172a, #020617);
            min-height: 100vh;
            color: white;
        }

        /* 🧊 Glass Navbar */
        .glass-nav {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ✨ Nav hover underline */
        .nav-link {
            position: relative;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #6366f1;
            left: 0;
            bottom: -4px;
            transition: 0.3s;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 🔥 Glow button */
        .btn-glow:hover {
            box-shadow: 0 0 15px #6366f1;
        }
    </style>
</head>

<body class="bg-main">

    <!-- 🔝 NAVBAR -->
    <nav class="glass-nav px-8 py-4 flex justify-between items-center sticky top-0 z-50">

        <!-- LOGO -->
        <a href="/" class="text-2xl font-bold text-indigo-400">
            FLOW 🚀
        </a>

        <!-- LINKS -->
        <div class="flex items-center space-x-6 text-gray-300 font-medium">

            <a href="/" class="nav-link hover:text-white">Home</a>
            <a href="/lms/courses/" class="nav-link hover:text-white">Courses</a>
            <a href="#" class="nav-link hover:text-white">Dashboard</a>

            {% if user.is_authenticated %}
                <span class="text-gray-400">Hi, {{ user.username }}</span>

                <a href="/accounts/logout/" 
                   class="bg-red-500 text-white px-4 py-2 rounded-xl hover:bg-red-600 btn-glow">
                   Logout
                </a>
            {% else %}
                <a href="/accounts/login/" 
                   class="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700 btn-glow">
                   Login
                </a>
            {% endif %}

        </div>

    </nav>

    <!-- 📦 MAIN CONTENT -->
    <main class="px-6 py-8 max-w-7xl mx-auto">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
