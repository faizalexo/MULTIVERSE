{% extends 'lms/base.html' %}

{% block content %}

<h1>All Courses</h1>

<div class="course-grid">
    {% for course in courses %}
    <a href="{% url 'lms:course_detail' course.slug %}">
        <div class="card">

            {% if course.image %}
            <img src="{{ course.image.url }}">
            {% endif %}

            <h3>{{ course.title }}</h3>
            <p>{{ course.description|truncatewords:15 }}</p>

        </div>
    </a>
    {% endfor %}
</div>

{% endblock %}
