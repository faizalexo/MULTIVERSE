{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto">

    <h1 class="text-3xl font-bold mb-8">Course Quiz</h1>

    <form method="POST" class="space-y-6">
        {% csrf_token %}

        {% for q in quizzes %}
        <div class="bg-white p-6 rounded-2xl shadow-lg">

            <h2 class="font-semibold mb-4">
                {{ forloop.counter }}. {{ q.question }}
            </h2>

            <div class="space-y-2">
                <label class="block">
                    <input type="radio" name="q{{ q.id }}" value="A"> {{ q.option_a }}
                </label>

                <label class="block">
                    <input type="radio" name="q{{ q.id }}" value="B"> {{ q.option_b }}
                </label>

                <label class="block">
                    <input type="radio" name="q{{ q.id }}" value="C"> {{ q.option_c }}
                </label>

                <label class="block">
                    <input type="radio" name="q{{ q.id }}" value="D"> {{ q.option_d }}
                </label>
            </div>

        </div>
        {% endfor %}

        <button class="bg-indigo-600 text-white px-6 py-3 rounded-xl w-full">
            Submit Quiz
        </button>

    </form>

</div>

{% endblock %}
