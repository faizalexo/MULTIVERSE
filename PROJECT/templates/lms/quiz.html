<h2>{{ question.text }}</h2>

{% for choice in question.choices.all %}
<button onclick="checkAnswer(this, {{ choice.id }}, {{ question.id }})">
    {{ choice.text }}
</button>
{% endfor %}

<button id="next-btn" style="display:none;">Next</button>

<script>
async function checkAnswer(btn, choiceId, questionId) {
    const res = await fetch("{% url 'lms:submit_answer' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            choice_id: choiceId,
            question_id: questionId
        })
    });

    const data = await res.json();

    if (data.correct) btn.style.background = "green";
    else btn.style.background = "red";

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = "block";

    if (data.next_question_id) {
        nextBtn.onclick = () => {
            window.location.href = `/quiz/${data.next_question_id}/`;
        };
    }
}
</script>
