{% extends "base.html" %}

{% block content %}

<style>

.glass {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    transition: 0.3s;
}


.glass:hover {
    transform: translateY(-3px);
}

.option {
    transition: 0.2s;
}
.option:hover {
    background: #f1f5f9;
}

.option.correct {
    background: #22c55e !important;
    color: white;
}
.option.wrong {
    background: #ef4444 !important;
    color: white;
}
</style>

<div class="max-w-3xl mx-auto">

    <!-- HEADER -->
    <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold">🧪 Quiz</h1>
        <p class="text-gray-500">Answer and move to next</p>
    </div>

    <!-- PROGRESS -->
    <div class="w-full bg-gray-200 rounded-full h-2 mb-6">
        <div id="progressBar" class="bg-indigo-600 h-2 rounded-full" style="width:0%"></div>
    </div>

    <!-- QUESTION CARD -->
    <div class="glass p-6 shadow">

        <h2 class="text-lg font-semibold mb-5">
            {{ question.text }}
        </h2>

        <div class="space-y-3">

            {% for choice in question.choices.all %}
            <div class="option p-3 border rounded-xl cursor-pointer"
                 onclick="checkAnswer(this, '{{ choice.id }}', '{{ question.id }}')"

                {{ choice.text }}

            </div>
            {% endfor %}

        </div>

    </div>

</div>

<script>
let answered = false;

function checkAnswer(element, choiceId, questionId) {

    if (answered) return;
    answered = true;

    fetch("{% url 'lms:submit_answer' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({
            choice_id: choiceId,
            question_id: questionId
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.correct) {
            element.classList.add("correct");
        } else {
            element.classList.add("wrong");
        }

        // progress bar
        document.getElementById('progressBar').style.width = "100%";

        // next question
        setTimeout(() => {
            if (data.next_question_id) {
                window.location.href = `/lms/quiz/${data.next_question_id}/`;
            } else {
                alert("🎉 Quiz Completed!");
            }
        }, 800);

    });
}
</script>

{% endblock %}
